<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STYLEHUB | Fashion Discovery</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="topbar">

  <div class="topbar-left">
    <div class="logo">STYLEHUB</div>
  </div>

  <div class="topbar-center">
    <input id="search" placeholder="Search outfits, brands, styles..." oninput="render()">
  </div>

  <div class="topbar-right">
    <button class="icon-btn">♡</button>
    <button class="icon-btn">👤</button>
  </div>

</header>

<!-- ================= CATEGORY NAV ================= -->
<nav class="category-bar">
  <button onclick="setFilter('all')">Home</button>
  <button onclick="setFilter('streetwear')">Streetwear</button>
  <button onclick="setFilter('smart')">Smart</button>
  <button onclick="setFilter('gym')">Gym</button>
  <button onclick="setFilter('minimal')">Minimal</button>
</nav>

<!-- ================= HERO BANNER ================= -->
<section class="hero">
  <div class="hero-content">
    <h1>Find your style instantly</h1>
    <p>Outfits curated for your lifestyle, budget and vibe.</p>
    <button onclick="setFilter('all')">Shop Now</button>
  </div>
</section>

<!-- ================= RECOMMENDED STRIP ================= -->
<section class="strip">
  <h2>Recommended for you</h2>
  <div class="strip-scroll" id="recommended"></div>
</section>

<!-- ================= MAIN FEED ================= -->
<main class="page">

  <section class="section-title">
    <h2>Trending outfits</h2>
  </section>

  <section id="grid" class="grid"></section>

</main>

<!-- ================= FOOTER ================= -->
<footer class="footer">
  <p>STYLEHUB © 2026 — Built for fashion discovery</p>
</footer>

<script src="script.js"></script>
</body>
</html>
