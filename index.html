<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Style Finder</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Style Finder</h1>
    <p>Pick a style or take the quiz</p>
  </header>

  <!-- QUIZ BUTTON -->
  <section class="quiz-box">
    <button onclick="startQuiz()">Take Style Quiz</button>
  </section>

  <!-- STYLE BUTTONS -->
  <section class="buttons">
    <button onclick="showOutfits('streetwear')">Streetwear</button>
    <button onclick="showOutfits('smart')">Smart Casual</button>
    <button onclick="showOutfits('gym')">Gym</button>
    <button onclick="showOutfits('minimal')">Minimalist</button>
  </section>

  <!-- OUTPUT -->
  <section id="outfits" class="outfits">
    <p>Choose a style to begin</p>
  </section>

  <script src="script.js"></script>
</body>
</html>
